<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4d6d"/>
      <stop offset="100%" style="stop-color:#c9184a"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#ff4d6d"/>
      <stop offset="25%"  style="stop-color:#ff9f1c"/>
      <stop offset="50%"  style="stop-color:#ffcc00"/>
      <stop offset="75%"  style="stop-color:#06d6a0"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="88" ry="88"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- Film strip left -->
  <rect x="0" y="0" width="72" height="512" fill="url(#filmGrad)" clip-path="url(#roundClip)"/>
  <rect x="16" y="28"  width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="76"  width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="124" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="172" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="220" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="268" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="316" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="364" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="412" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="16" y="460" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>

  <!-- Film strip right -->
  <rect x="440" y="0" width="72" height="512" fill="url(#filmGrad)" clip-path="url(#roundClip)"/>
  <rect x="456" y="28"  width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="76"  width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="124" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="172" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="220" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="268" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="316" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="364" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="412" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="456" y="460" width="40" height="28" rx="5" fill="#ffffff" fill-opacity="0.07"/>

  <line x1="72" y1="0" x2="72" y2="512" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="440" y1="0" x2="440" y2="512" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Rainbow arc -->
  <path d="M 110 280 Q 256 80 402 280" fill="none" stroke="url(#arcGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M 130 292 Q 256 112 382 292" fill="none" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Big M -->
  <text x="256" y="340" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="200" font-weight="900" fill="url(#mGrad)" filter="url(#textGlow)" letter-spacing="-8">M</text>

  <!-- Wordmark -->
  <text x="256" y="415" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="6" opacity="0.95">MOODFLIX</text>

  <!-- Accent line -->
  <line x1="130" y1="428" x2="382" y2="428" stroke="url(#arcGrad)" stroke-width="2" opacity="0.7"/>

  <!-- Tagline -->
  <text x="256" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#ffffff" letter-spacing="3" opacity="0.4">HİSSET. İZLE.</text>
</svg>
